# Dependabot — weekly dependency + GitHub Actions update PRs.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm packages (single package at the repo root).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Bump the requirement to the new version (preserving exactness where the
    # pin is exact) rather than widening into a range.
    versioning-strategy: increase
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Low-risk, high-noise dev-dependency minor/patch bumps ride ONE PR.
      # Production/runtime deps get INDIVIDUAL PRs (and majors are always
      # individual) so each is reviewed on its own before CI + a human merge.
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # GitHub Actions pinned in .github/workflows/*.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
